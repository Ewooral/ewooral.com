name: Deploy to VPS

on:
  push:
    branches: [main]
    # CI minutes thrift — push events that ONLY touch the paths below
    # are skipped (zero billing, no workflow row in Actions). Mixed
    # pushes (docs + code) still fire normally.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE*'
      - '.editorconfig'
      - '.gitattributes'

concurrency:
  group: deploy-site
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/ewooral/ewooral-site:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Retry pull — ghcr.io occasionally drops mid-layer ('connection
            # reset' or containerd commit error). Without this, the script
            # used to continue past the failure and restart the OLD image,
            # leaving the deploy silently green.
            for attempt in 1 2 3 4 5; do
              if docker pull ${{ env.IMAGE }}; then
                echo "Pull succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" = "5" ]; then
                echo "FATAL: docker pull failed after 5 attempts — aborting deploy"
                exit 1
              fi
              echo "Pull attempt $attempt failed — retrying in 10s"
              sleep 10
            done

            cd ~/apps/ewooral-site
            git fetch origin && git reset --hard origin/main
            docker compose up -d --force-recreate --pull always web
            docker compose restart nginx
            docker image prune -f
